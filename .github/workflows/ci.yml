name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod download
        run: go mod download

      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: unit tests
        run: go test -race -timeout 5m ./...

  terraform-fmt:
    name: terraform fmt examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.*"
          terraform_wrapper: false

      - name: terraform fmt -check
        run: terraform fmt -check -recursive examples/

  docs:
    name: docs are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: install tfplugindocs
        run: go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@latest

      - name: regenerate docs
        run: tfplugindocs generate --provider-name anthropic

      - name: fail if docs drifted
        run: |
          if [ -n "$(git status --porcelain docs/)" ]; then
            echo "docs/ is out of sync with schema. Run 'make docs' locally and commit."
            git diff --stat docs/
            exit 1
          fi
